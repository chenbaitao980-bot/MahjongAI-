# strongSwan IKEv2 VPN server config
# Generated by vpn_configure.py
#
# Full tunnel: ALL phone traffic via VPN.
# Android's built-in VPN REQUIRES leftsubnet=0.0.0.0/0 — narrowing the
# traffic selector (e.g. 47.96.0.227/32) makes the native client reject the
# negotiated CHILD_SA and DELETE the tunnel right after IKE_AUTH succeeds.
# Server-side split tunnel only works with the strongSwan app, not system VPN.

config setup
    charondebug="ike 2, knl 2, cfg 2"
    uniqueids=no

conn mahjong-vpn
    keyexchange=ikev2
    ike=aes256-sha256-modp2048,aes128-sha256-modp2048,aes256-sha256-ecp256,aes256-sha256-modp1024
    esp=aes256-sha256,aes128-sha256
    dpdaction=clear
    dpddelay=30s
    rekey=no
    left=%any
    leftid=8.136.37.136
    leftsubnet=0.0.0.0/0
    leftauth=psk
    right=%any
    rightauth=psk
    rightsourceip=10.99.0.0/24
    mobike=yes
    auto=add
